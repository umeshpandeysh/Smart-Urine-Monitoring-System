name: Bug Report
description: Report a bug in UroSense (firmware, API, dashboard, or database)
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out this form as completely as possible.

  - type: dropdown
    id: layer
    attributes:
      label: Affected Layer
      description: Which part of UroSense is affected?
      options:
        - Firmware (ESP32 / Arduino)
        - API Routes (Next.js)
        - User Portal (Frontend)
        - Admin Dashboard (Frontend)
        - Operations Dashboard (Frontend)
        - Database / Supabase
        - Authentication
        - CI/CD / Deployment
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I click on [X], I see [Y] instead of [Z]..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste any relevant console errors, serial monitor output, or Supabase logs.
      render: text

  - type: input
    id: version
    attributes:
      label: UroSense Version / Commit
      placeholder: "e.g., v2.0.0 or commit abc1234"
